services:
  caddy:
    image: caddy:2.8
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/data/caddy/data:/data
      - /opt/data/caddy/config:/config
    networks:
      - frontend

networks:
  frontend:
    external: true

